<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>みんなのまちたんけんマップ</title>
    
    <!-- React 18 & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'terracotta': '#E27D60',
              'cream': '#FDFCF0',
              'accent': '#41B3A3',

            }
          }

      }
    </script>
    <style>
      /* 基本スタイル調整：画面いっぱい・スクロール禁止 */
      html, body, #root {
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        touch-action: none;
      }

      body {
        font-family: 'M PLUS Rounded 1c', sans-serif;
        background-color: #FDFCF0;
        color: #333;
        overscroll-behavior-y: none;
      }
      
      .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #E27D60; border-radius: 3px; }
      .scrollbar-thin::-webkit-scrollbar-track { background-color: #eee; }

        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-modal-pop { animation: modalPop 0.15s ease-out; }

      @keyframes toastSlide {
        from { opacity: 0; transform: translateY(-20px) translateX(-50%); }
        to { opacity: 1; transform: translateY(0) translateX(-50%); }

      .animate-toast { animation: toastSlide 0.3s ease-out forwards; }

      /* 地図操作用のカーソルスタイル */
      .grab-cursor { cursor: grab; }
      .grab-cursor:active { cursor: grabbing; }
      .pen-cursor { cursor: crosshair; }

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo, useRef } = React;

      // ==========================================
      //  定数・設定
      // ==========================================
      const CONSTANTS = {
        DEFAULT_MAP: "https://drive.google.com/thumbnail?sz=w1000&id=1_jP8V39lBw3H_EqbFBUyQOjdN58gVNSL",
        TEACHER_PASSWORD: 'sensei',
        POLLING_INTERVAL: 30000,
        MIN_SCALE: 1,
        MAX_SCALE: 4,     // 最大拡大率
        ZOOM_STEP: 0.5,   // ボタン1回での拡大率
      };

      const GROUPS = [
        { id: 1, name: '1ぱん' }, { id: 2, name: '2はん' },
        { id: 3, name: '3ぱん' }, { id: 4, name: '4はん' },
        { id: 5, name: '5はん' }, { id: 6, name: '6ぱん' },
        { id: 7, name: '7はん' }, { id: 8, name: '8ぱん' },
        { id: 9, name: '9はん' }, { id: 10, name: '10ぱん' },
      ];

      const PIN_COLORS = [
        { id: 'red', color: '#EF4444', label: 'あか' },
        { id: 'blue', color: '#3B82F6', label: 'あお' },
        { id: 'yellow', color: '#EAB308', label: 'きいろ' },
        { id: 'green', color: '#22C55E', label: 'みどり' },
        { id: 'purple', color: '#A855F7', label: 'むらさき' },
        { id: 'pink', color: '#EC4899', label: 'ぴんく' },
        { id: 'cyan', color: '#06B6D4', label: 'みずいろ' },
        { id: 'orange', color: '#F97316', label: 'おれんじ' },
      ];

      // ==========================================
      //  Helper Functions
      // ==========================================
      
      const resolveImageUrl = (url) => {
        if (!url) return null;
        if (url.includes('drive.google.com/thumbnail')) return url;
        if (url.includes('lh3.googleusercontent.com')) return url;
        
        const idMatch = url.match(/id=([^&]+)/) || url.match(/\/d\/([^\/]+)/);
        if (idMatch && idMatch[1]) {
          return `https://drive.google.com/thumbnail?sz=w1000&id=${idMatch[1]}`;
        }
        return url;
      };

      const compressImage = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_SIZE = 800; 
              let w = img.width;
              let h = img.height;
              
              if (w > h) {
                if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
              } else {
                if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
              }
              
              canvas.width = w;
              canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.7)); 
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      // 点が多角形の中にあるか判定 (Ray Casting Algorithm)
      const isPointInPolygon = (point, vs) => {
        let x = point.x, y = point.y;
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          let xi = vs[i].x, yi = vs[i].y;
          let xj = vs[j].x, yj = vs[j].y;
          let intersect = ((yi > y) !== (yj > y))
              && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      };

      // ==========================================
      //  Custom Hooks
      // ==========================================

      const usePinData = (isEnabled) => {
        const [pins, setPins] = useState([]);
        const [mapUrl, setMapUrl] = useState(CONSTANTS.DEFAULT_MAP);
        const [lastUpdated, setLastUpdated] = useState(null);

        const fetchData = useCallback(() => {
          if (typeof google === 'undefined') return;
          
          google.script.run
            .withSuccessHandler((json) => {
              const res = JSON.parse(json);
              if (res.status === 'success') {
                setPins(res.data);
                if (res.map_url) setMapUrl(res.map_url);
                setLastUpdated(new Date());
              }
            })
            .withFailureHandler(console.error)
            .getPinData();
        }, []);

        useEffect(() => {
          if (!isEnabled) return;
          fetchData(); 
          const timer = setInterval(fetchData, CONSTANTS.POLLING_INTERVAL);
          return () => clearInterval(timer);
        }, [isEnabled, fetchData]);

        return { pins, mapUrl, fetchData, lastUpdated, setPins, setMapUrl };
      };

      // ==========================================
      //  UI Components
      // ==========================================

      const LoadingOverlay = () => (
        <div className="fixed inset-0 bg-white/80 z-toast flex items-center justify-center backdrop-blur-sm">
          <div className="text-center">
            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-terracotta mx-auto mb-4"></div>
            <p className="text-xl font-bold text-terracotta animate-pulse">しょりしています...</p>
          </div>
        </div>
      );

      const Toast = ({ message, type, onClose }) => {
        useEffect(() => {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }, [message, onClose]);

        const style = type === 'error' ? 'bg-red-500' : 'bg-terracotta';
        const icon = type === 'error' ? '⚠️' : '✅';

        return (
          <div className={`fixed top-6 left-1/2 z-toast animate-toast flex items-center gap-3 px-6 py-3 rounded-full shadow-xl text-white font-bold ${style} min-w-[300px] justify-center`}>
            <span className="text-xl">{icon}</span>
            <span>{message}</span>
          </div>
        );
      };

      const ModalDialog = ({ title, message, type, onConfirm, onCancel }) => {
        const [val, setVal] = useState('');
        
        const handleSubmit = () => {
          if (type === 'prompt' && !val) return;
          onConfirm(type === 'prompt' ? val : true);
        };

        return (
          <div className="fixed inset-0 bg-black/60 z-dialog flex items-center justify-center p-4 animate-modal-pop">
            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border-4 border-terracotta text-center relative z-dialog">
              <h3 className="text-xl font-bold text-gray-800 mb-2">{title}</h3>
              <p className="text-gray-600 mb-6 whitespace-pre-wrap font-medium">{message}</p>
              
              {type === 'prompt' && (
                <input 
                  type="password"
                  className="w-full border-2 border-gray-300 rounded-lg p-3 mb-6 text-lg focus:border-terracotta outline-none"
                  placeholder="ここに入力"
                  value={val}
                  onChange={(e) => setVal(e.target.value)}
                  autoFocus
                />
              )}

              <div className="flex gap-3 justify-center">
                <button onClick={onCancel} className="px-6 py-2 rounded-full bg-gray-200 text-gray-600 font-bold hover:bg-gray-300 transition">キャンセル</button>
                <button onClick={handleSubmit} className="px-8 py-2 rounded-full bg-terracotta text-white font-bold hover:opacity-90 transition shadow-md">OK</button>
              </div>
            </div>
          </div>
        );
      };

      const PinIcon = ({ color, onClick, isNew }) => (
        <div 
          onClick={onClick}
          className={`absolute -translate-x-1/2 -translate-y-full cursor-pointer flex items-end justify-center transition-transform ${!isNew && 'hover:scale-110 active:scale-95'}`}
          style={{ width: '44px', height: '44px', color: color, pointerEvents: 'auto' }} 
        >
          <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full stroke-white stroke-2 drop-shadow-md">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
          </svg>
        </div>
      );

      // --- ピンリストモーダル（範囲選択後・内容更新・横長大画面化） ---
      const PinListModal = ({ pins, onClose, onSelect }) => {
        return (
          <div className="fixed inset-0 bg-black/60 z-modal flex items-center justify-center p-4 animate-modal-pop" onClick={onClose}>
            {/* max-w-5xl で横幅を大きく確保 */}
            <div className="bg-white w-full max-w-5xl rounded-3xl shadow-2xl overflow-hidden max-h-[85vh] flex flex-col relative" onClick={e => e.stopPropagation()}>
              <div className="bg-terracotta p-4 text-white flex justify-between items-center shadow-md shrink-0">
                <h3 className="font-bold text-xl flex items-center gap-2">
                  <span>📍</span> えらんだ場所の一覧 ({pins.length}件)
                </h3>
                <button onClick={onClose} className="bg-white/20 hover:bg-white/30 rounded-full w-10 h-10 flex items-center justify-center text-lg font-bold transition">✕</button>
              </div>
              <div className="p-4 md:p-6 overflow-y-auto bg-gray-50 flex-1">
                {pins.length === 0 ? (
                  <p className="text-center text-gray-500 py-10 text-lg">ピンは みつかりませんでした</p>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {pins.map(pin => (
                      <div 
                        key={pin.id} 
                        onClick={() => onSelect(pin)}
                        className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex gap-4 cursor-pointer hover:border-terracotta hover:bg-orange-50 transition items-start h-full"
                      >
                        <div className="w-24 h-24 bg-gray-100 rounded-lg overflow-hidden shrink-0 border border-gray-200">
                          {pin.image_url ? (
                            <img src={resolveImageUrl(pin.image_url)} className="w-full h-full object-cover" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-2xl text-gray-300">📷</div>
                          )}
                        </div>
                        <div className="flex-1 min-w-0 flex flex-col h-full">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="w-3 h-3 rounded-full shrink-0 shadow-sm" style={{backgroundColor: pin.pin_color}}></span>
                            <span className="text-sm font-bold text-gray-500">投稿者: {pin.author_name}</span>
                          </div>
                          <h4 className="font-bold text-gray-800 text-xl leading-tight mb-2">{pin.shop_name}</h4>
                          <div className="text-sm text-gray-700 bg-gray-50 p-2 rounded border border-gray-100 whitespace-pre-wrap flex-1">
                            {pin.description || '（メモなし）'}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // --- ピン詳細モーダル（個別表示・横長2カラム化・ラベル切れ修正版） ---
      const PinDetailModal = ({ pin, onClose, onDelete }) => {
        if (!pin) return null;
        return (
          <div className="fixed inset-0 bg-black/70 z-modal flex items-center justify-center p-4 animate-modal-pop" onClick={onClose}>
            {/* max-w-4xl で幅広、md:flex-row でPC時は横並びレイアウト */}
            <div className="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col md:flex-row relative" onClick={e => e.stopPropagation()}>
              
              {/* 画像エリア (PC: 左半分 / SP: 上半分) */}
              <div className="relative w-full md:w-1/2 h-64 md:h-auto bg-gray-100 shrink-0">
                {pin.image_url ? (
                  <img src={resolveImageUrl(pin.image_url)} className="w-full h-full object-cover" alt="写真" />
                ) : (
                  <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 bg-orange-50">
                    <span className="text-6xl mb-4">📷</span>
                    <span className="font-bold text-lg">しゃしんは ありません</span>
                  </div>
                )}
                {/* 閉じるボタン（SP用） */}
                <button onClick={onClose} className="absolute top-4 right-4 bg-black/50 text-white hover:bg-black/70 rounded-full w-10 h-10 flex md:hidden items-center justify-center shadow-lg font-bold backdrop-blur-sm transition">✕</button>
              </div>

              {/* 情報エリア (PC: 右半分 / SP: 下半分) */}
              <div className="flex-1 p-6 md:p-8 overflow-y-auto bg-white flex flex-col relative">
                {/* 閉じるボタン（PC用） */}
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 rounded-full w-10 h-10 hidden md:flex items-center justify-center text-2xl transition hover:bg-gray-100">✕</button>

                <div className="flex items-center gap-3 mb-2">
                  <span className="px-3 py-1 rounded-full bg-gray-100 text-sm font-bold text-gray-600 flex items-center gap-2 border border-gray-200">
                    <span className="w-3 h-3 rounded-full shadow-sm" style={{backgroundColor: pin.pin_color}}></span>
                    {GROUPS.find(g => String(g.id) === String(pin.group_id))?.name || '不明'}
                  </span>
                  <span className="text-sm text-gray-400">{pin.timestamp}</span>
                </div>
                
                <h2 className="text-3xl md:text-4xl font-bold text-gray-800 font-rounded mb-6 leading-tight border-b pb-4 border-gray-100">
                  {pin.shop_name}
                </h2>

                {/* メモ欄: ラベルが見切れないように修正 */}
                <div className="flex-1 min-h-0 mt-3">
                  {/* 外枠: ここには overflow をつけない */}
                  <div className="bg-cream rounded-2xl border-2 border-dashed border-terracotta/30 relative h-full flex flex-col mb-4">
                    {/* ラベル: z-indexを上げて手前に表示 */}
                    <span className="absolute -top-3 left-4 bg-white px-2 text-sm font-bold text-terracotta z-10">📝 みつけたこと・メモ</span>
                    {/* 中身: ここをスクロールさせる */}
                    <div className="p-5 overflow-y-auto h-full rounded-2xl">
                      <p className="text-lg text-gray-700 whitespace-pre-wrap font-medium leading-relaxed">
                        {pin.description || '（メモは かかれていません）'}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="flex justify-between items-end border-t pt-4 mt-auto shrink-0">
                  <div>
                    <span className="text-sm text-gray-400 block mb-1">はっけんした人</span>
                    <span className="font-bold text-xl text-gray-800">{pin.author_name}</span>
                  </div>
                  <button 
                    onClick={() => onDelete(pin.id)} 
                    className="text-red-500 text-sm border border-red-200 px-4 py-2 rounded-full hover:bg-red-50 transition font-bold flex items-center gap-1"
                  >
                    <span>🗑️</span> 削除(先生用)
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const PinCreateModal = ({ position, myGroup, onClose, onSubmit, isProcessing }) => {
        const [form, setForm] = useState({
          color: PIN_COLORS[0],
          author: '',
          shop: '',
          desc: '',
          image: null
        });

        const handleImageChange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const resizedBase64 = await compressImage(file);
            setForm(prev => ({ ...prev, image: resizedBase64 }));
          } catch (err) {
            console.error(err);
            alert('画像の処理に失敗しました');
          }
        };

        const handleSubmit = () => {
          if (!form.shop || !form.author) {
            alert('「なまえ」と「ばしょ」は かならず かいてね！');
            return;
          }
          onSubmit({ ...form, ...position });
        };

        return (
          <div className="fixed inset-0 bg-black/50 z-modal flex items-center justify-center p-4 animate-modal-pop">
            <div className="bg-cream w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border-4 border-terracotta flex flex-col max-h-[90vh]">
              <div className="bg-terracotta p-4 text-white text-center font-bold text-xl shrink-0 relative">
                📌 ピンをさす
                <button onClick={onClose} className="absolute right-4 top-1/2 -translate-y-1/2 text-2xl opacity-80 hover:opacity-100">✖</button>
              </div>
              <div className="p-6 space-y-5 overflow-y-auto">
                <div>
                  <label className="block font-bold text-gray-700 mb-2">① ピンのいろ</label>
                  <div className="flex flex-wrap gap-3">
                    {PIN_COLORS.map(c => (
                      <button
                        key={c.id}
                        onClick={() => setForm(prev => ({ ...prev, color: c }))}
                        className={`w-10 h-10 rounded-full border-2 transition-transform ${form.color.id === c.id ? 'border-gray-600 scale-110 ring-2 ring-gray-300' : 'border-white'}`}
                        style={{ backgroundColor: c.color }}
                      />
                    ))}
                    <span className="ml-2 font-bold text-gray-600 self-center">{form.color.label}</span>
                  </div>
                </div>
                <div className="space-y-4">
                  <input type="text" placeholder="② かいたひと（なまえ）" className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-terracotta outline-none bg-white" value={form.author} onChange={e => setForm(prev => ({ ...prev, author: e.target.value }))} />
                  <input type="text" placeholder="③ みつけたものの なまえ" className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-terracotta outline-none bg-white" value={form.shop} onChange={e => setForm(prev => ({ ...prev, shop: e.target.value }))} />
                  <textarea placeholder="④ メモ（みつけたこと）" className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-terracotta outline-none bg-white h-24 resize-none" value={form.desc} onChange={e => setForm(prev => ({ ...prev, desc: e.target.value }))} />
                </div>
                <div>
                  <label className="block w-full p-4 border-2 border-dashed border-gray-400 rounded-lg text-center cursor-pointer bg-white hover:bg-orange-50 transition">
                    <span className="text-2xl block mb-1">📷</span>
                    <span className="text-terracotta font-bold text-sm">しゃしんを とる・えらぶ</span>
                    <input type="file" accept="image/*" className="hidden" onChange={handleImageChange} />
                  </label>
                  {form.image && (
                    <div className="mt-2 relative">
                      <img src={form.image} className="w-full rounded-lg border shadow-sm max-h-40 object-cover" />
                      <button onClick={() => setForm(prev => ({ ...prev, image: null }))} className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-7 h-7 font-bold shadow">✖</button>
                    </div>
                  )}
                </div>
                <button onClick={handleSubmit} disabled={isProcessing} className="w-full bg-terracotta text-white font-bold text-xl py-4 rounded-xl shadow-lg active:scale-95 transition disabled:opacity-50 disabled:scale-100">
                  {isProcessing ? 'そうしん中...' : '決定！'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const TeacherDashboard = ({ pins, mapUrl, onUpdateMap, onDeletePin, onClose, openPrompt }) => {
        const [newUrl, setNewUrl] = useState(mapUrl);

        const downloadCSV = () => {
          let csv = "\uFEFFID,日時,班,色,名前,場所,メモ,画像URL\n";
          pins.forEach(p => {
            const row = [
              p.id, p.timestamp, 
              GROUPS.find(g => String(g.id) === p.group_id)?.name,
              PIN_COLORS.find(c => c.color === p.pin_color)?.label,
              `"${p.author_name}"`, `"${p.shop_name}"`, `"${p.description}"`,
              resolveImageUrl(p.image_url) || ''
            ];
            csv += row.join(',') + '\n';
          });
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `まちたんけん_${new Date().toLocaleDateString()}.csv`;
          link.click();
        };

        return (
          <div className="fixed inset-0 bg-gray-100 z-modal overflow-y-auto animate-modal-pop">
            <div className="bg-terracotta text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
              <h2 className="font-bold text-lg">🏫 先生用管理画面</h2>
              <button onClick={onClose} className="bg-white text-terracotta px-4 py-1 rounded-full font-bold text-sm shadow">閉じる</button>
            </div>
            <div className="max-w-4xl mx-auto p-4 space-y-6">
              <section className="bg-white p-6 rounded-xl shadow border-l-4 border-blue-500">
                <h3 className="font-bold text-gray-700 mb-4 border-b pb-2">🗺️ 地図の変更</h3>
                <div className="flex gap-2 flex-col md:flex-row">
                  <input type="text" value={newUrl} onChange={e => setNewUrl(e.target.value)} className="border p-2 rounded flex-1 bg-gray-50" placeholder="Google Driveの共有リンク" />
                  <button onClick={() => openPrompt('確認', '変更パスワードを入力', (pass) => onUpdateMap(newUrl, pass))} className="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">変更</button>
                </div>
              </section>
              <section className="bg-white p-6 rounded-xl shadow border-l-4 border-green-500 flex justify-between items-center">
                <h3 className="font-bold text-gray-700">📥 データダウンロード</h3>
                <button onClick={downloadCSV} className="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700">CSV保存</button>
              </section>
              <section className="bg-white p-6 rounded-xl shadow border-l-4 border-red-500">
                <h3 className="font-bold text-gray-700 mb-4 border-b pb-2">📍 投稿データ管理 ({pins.length}件)</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left">
                    <thead className="bg-gray-100 text-gray-600">
                      <tr><th className="p-2">班</th><th className="p-2">名前</th><th className="p-2">場所</th><th className="p-2">操作</th></tr>
                    </thead>
                    <tbody className="divide-y">
                      {pins.map(p => (
                        <tr key={p.id} className="hover:bg-gray-50">
                          <td className="p-2">{GROUPS.find(g => String(g.id) === p.group_id)?.name}</td>
                          <td className="p-2">{p.author_name}</td>
                          <td className="p-2 font-bold">{p.shop_name}</td>
                          <td className="p-2">
                            <button onClick={() => openPrompt('削除確認', 'パスワードを入力', (pass) => onDeletePin(p.id, pass))} className="text-red-500 bg-red-50 px-2 py-1 rounded border border-red-200 text-xs">削除</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>
          </div>
        );
      };

      // ==========================================
      //  Main Application Component
      // ==========================================
      
      const App = () => {
        const [myGroup, setMyGroup] = useState(null); 
        const [viewMode, setViewMode] = useState('mine'); 
        
        // Custom Hook (Always called before any return)
        const { pins, mapUrl, fetchData, setPins, setMapUrl } = usePinData(!!myGroup);

        const [toast, setToast] = useState(null);
        const [modal, setModal] = useState(null); 
        
        const [selectedPin, setSelectedPin] = useState(null);
        const [creatingPos, setCreatingPos] = useState(null);
        const [processing, setProcessing] = useState(false);
        const [showDashboard, setShowDashboard] = useState(false);
        
        // Map Transform State
        const [transform, setTransform] = useState({ scale: 1, x: 0, y: 0 });
        const isDragging = useRef(false);
        const isPointerDown = useRef(false); 
        const dragStart = useRef({ x: 0, y: 0 });
        const mapRef = useRef(null); 

        // Drawing (Lasso) State
        const [drawMode, setDrawMode] = useState(false);
        const [isDrawing, setIsDrawing] = useState(false);
        const [lassoPoints, setLassoPoints] = useState([]);
        const [areaPins, setAreaPins] = useState(null);

        // --- UseMemo for Drawing Path ---
        const lassoPath = useMemo(() => {
          if (lassoPoints.length < 2) return '';
          return 'M ' + lassoPoints.map(p => `${p.x} ${p.y}`).join(' L ');
        }, [lassoPoints]);

        // --- モード判定 ---
        const isEditMode = viewMode === 'mine' && myGroup !== 'teacher'; // ピン刺しOK（自分の班のみ）
        const isLassoMode = viewMode === 'all'; // 範囲選択OK（みんなの地図）

        const showToast = (msg, type = 'success') => setToast({ message: msg, type });
        const closeModal = () => setModal(null);
        
        const openPrompt = (title, msg, onConfirm) => {
          setModal({ type: 'prompt', title, message: msg, onConfirm: (v) => { closeModal(); onConfirm(v); }, onCancel: closeModal });
        };
        const openConfirm = (title, msg, onConfirm) => {
          setModal({ type: 'confirm', title, message: msg, onConfirm: () => { closeModal(); onConfirm(); }, onCancel: closeModal });
        };

        // --- Utils for coordinate conversion ---
        const getRelativePos = (clientX, clientY) => {
          const mapImg = mapRef.current;
          if (!mapImg) return null;
          const rect = mapImg.getBoundingClientRect();
          if (clientX < rect.left || clientX > rect.right || 
              clientY < rect.top || clientY > rect.bottom) {
            return null;
          }
          const x = ((clientX - rect.left) / rect.width) * 100;
          const y = ((clientY - rect.top) / rect.height) * 100;
          return { x, y };
        };

        // --- Map Interaction Handlers ---

        const handlePointerDown = (e) => {
          if (e.target.closest('button')) return; 

          // 描画モード（みんなの地図モードでのみ有効）
          if (drawMode && isLassoMode) {
            const pos = getRelativePos(e.clientX, e.clientY);
            if (pos) {
              setIsDrawing(true);
              setLassoPoints([pos]);
              e.currentTarget.setPointerCapture(e.pointerId); 
            }
            return;
          }

          // 通常モード（移動は全モードで許可）
          isPointerDown.current = true;
          isDragging.current = false; 
          dragStart.current = { 
            x: e.clientX - transform.x, 
            y: e.clientY - transform.y 
          };
        };

        const handlePointerMove = (e) => {
          // 描画モードの移動
          if (drawMode && isDrawing && isLassoMode) {
            const pos = getRelativePos(e.clientX, e.clientY);
            if (pos) {
              setLassoPoints(prev => [...prev, pos]);
            }
            return;
          }

          // 通常モードの移動
          if (!isPointerDown.current) return;
          const newX = e.clientX - dragStart.current.x;
          const newY = e.clientY - dragStart.current.y;
          if (Math.abs(newX - transform.x) > 10 || Math.abs(newY - transform.y) > 10) {
            isDragging.current = true;
            setTransform(prev => ({ ...prev, x: newX, y: newY }));
          }
        };

        const handlePointerUp = (e) => {
          // 描画終了処理
          if (drawMode && isDrawing && isLassoMode) {
            setIsDrawing(false);
            e.currentTarget.releasePointerCapture(e.pointerId);
            
            // 判定実行
            if (lassoPoints.length > 5) { 
              const containedPins = pins.filter(p => isPointInPolygon({x: p.map_x, y: p.map_y}, lassoPoints));
              if (containedPins.length > 0) {
                setAreaPins(containedPins);
              } else {
                showToast('かこんだ中に ピンはありませんでした', 'error');
              }
            }
            setLassoPoints([]);
            setDrawMode(false); 
            return;
          }

          isPointerDown.current = false;
        };

        const handleMapClick = (e) => {
          // 描画モード中やドラッグ後はクリック処理しない
          if (drawMode || isDragging.current) {
            isDragging.current = false;
            return;
          }
          if (e.target.closest('.pin-element')) return; 

          // ピン刺し（自分の班モードでのみ有効）
          if (!isEditMode) return;

          const pos = getRelativePos(e.clientX, e.clientY);
          if (pos) {
            setCreatingPos(pos);
          }
        };

        const handlePinClick = (e, pin) => {
          e.stopPropagation();
          if (drawMode || isDragging.current) return;
          setSelectedPin(pin);
        };

        const handleZoom = (direction) => {
          setTransform(prev => {
            const newScale = Math.min(Math.max(prev.scale + (direction * CONSTANTS.ZOOM_STEP), CONSTANTS.MIN_SCALE), CONSTANTS.MAX_SCALE);
            return { ...prev, scale: newScale };
          });
        };
        
        const handleReset = () => {
          setTransform({ scale: 1, x: 0, y: 0 });
        };

        // ピン保存処理
        const handleSavePin = (data) => {
          setProcessing(true);
          const payload = {
            action: 'save_pin',
            id: `pin_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
            pin_color: data.color.color,
            group_id: myGroup,
            author_name: data.author,
            map_x: data.x, 
            map_y: data.y,
            shop_name: data.shop,
            description: data.desc,
            image_data: data.image
          };

          if (typeof google === 'undefined') {
            console.log('Dev Mode Save:', payload);
            setProcessing(false);
            setCreatingPos(null);
            showToast('開発モード: 保存しました');
            return;
          }

          google.script.run
            .withSuccessHandler((resStr) => {
              const res = JSON.parse(resStr);
              setProcessing(false);
              if (res.status === 'success') {
                showToast('ピンをさしました！');
                setCreatingPos(null);
                fetchData();
              } else {
                showToast(res.message, 'error');
              }
            })
            .withFailureHandler(() => {
              setProcessing(false);
              showToast('エラーが発生しました', 'error');
            })
            .savePinData(JSON.stringify(payload));
        };

        // その他のハンドラ (変更なし)
        const handleDeletePin = (id, password) => {
          setProcessing(true);
          const payload = { action: 'delete_pin', target_id: id, password };
          google.script.run
            .withSuccessHandler((resStr) => {
              setProcessing(false);
              const res = JSON.parse(resStr);
              if (res.status === 'success') { showToast('削除しました'); setSelectedPin(null); fetchData(); } 
              else { showToast(res.message, 'error'); }
            }).savePinData(JSON.stringify(payload));
        };

        const handleUpdateMap = (url, password) => {
          setProcessing(true);
          const payload = { map_url: url, password };
          google.script.run
            .withSuccessHandler((resStr) => {
              setProcessing(false);
              const res = JSON.parse(resStr);
              if (res.status === 'success') { showToast('地図を更新しました'); setMapUrl(url); } 
              else { showToast(res.message, 'error'); }
            }).saveMapSetting(JSON.stringify(payload));
        };

        const handleLogin = (password) => {
          if (password === CONSTANTS.TEACHER_PASSWORD) {
            setMyGroup('teacher'); setViewMode('all'); setShowDashboard(true);
          } else { showToast('パスワードがちがいます', 'error'); }
        };

        // --- Render: Login / Group Select ---
        if (!myGroup) {
          return (
            <div className="h-full bg-cream flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white max-w-2xl w-full rounded-3xl shadow-xl border-4 border-terracotta p-8 text-center animate-modal-pop">
                <h1 className="text-3xl font-bold text-terracotta mb-2 font-rounded">みんなの まちたんけん</h1>
                <p className="text-lg font-bold text-gray-500 mb-8">あなたの グループを えらんでね</p>
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                  {GROUPS.map(g => (
                    <button key={g.id} onClick={() => setMyGroup(g.id)} className="bg-orange-50 hover:bg-terracotta hover:text-white text-terracotta font-bold py-4 rounded-xl transition transform active:scale-95 border-2 border-orange-100 shadow-sm">
                      {g.name}
                    </button>
                  ))}
                </div>
                <div className="mt-10 pt-6 border-t border-gray-100">
                  <button onClick={() => openPrompt('先生用ログイン', 'パスワードを入力', handleLogin)} className="text-gray-400 text-sm underline hover:text-terracotta">先生用メニュー</button>
                </div>
              </div>
              {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
              {modal && <ModalDialog {...modal} />}
            </div>
          );
        }

        const visiblePins = pins.filter(p => viewMode === 'all' || String(p.group_id) === String(myGroup));
        const groupName = GROUPS.find(g => g.id === myGroup)?.name || '先生モード';

        return (
          <div className="h-full bg-cream flex flex-col relative overflow-hidden">
            {/* Header */}
            <header className="bg-terracotta p-2 text-white shadow-lg z-30 shrink-0">
              <div className="w-full px-2 flex flex-col md:flex-row justify-between items-center gap-2">
                <h1 className="text-lg font-bold font-rounded flex items-center gap-2"><span>📍</span> {groupName}</h1>
                <div className="flex gap-2 text-sm font-bold">
                  <button onClick={() => { setMyGroup(null); setShowDashboard(false); }} className="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full transition">🏠 もどる</button>
                  {myGroup !== 'teacher' && (
                    <button onClick={() => setViewMode(prev => prev === 'mine' ? 'all' : 'mine')} className={`px-3 py-1 rounded-full transition shadow-sm ${viewMode === 'all' ? 'bg-yellow-400 text-black animate-pulse' : 'bg-white text-terracotta'}`}>
                      {viewMode === 'mine' ? '🌏 みんなの地図' : '👀 じぶんの班'}
                    </button>
                  )}
                  <button onClick={() => { fetchData(); showToast('更新しました'); }} className="bg-white text-terracotta px-3 py-1 rounded-full active:scale-95">🔄 更新</button>
                  {myGroup === 'teacher' && <button onClick={() => setShowDashboard(true)} className="bg-gray-800 text-white px-3 py-1 rounded-full">🔧 管理</button>}
                </div>
              </div>
            </header>

            {/* Map Area */}
            <main 
              className={`flex-1 min-h-0 w-full relative overflow-hidden bg-cream flex items-center justify-center ${drawMode ? 'cursor-crosshair' : 'cursor-move'}`}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
            >
              
              {/* Overlay Message */}
              <div className="absolute top-4 left-0 w-full text-center z-overlay pointer-events-none">
                {drawMode ? (
                  <span className="bg-blue-600 border-2 border-white text-white px-6 py-2 rounded-full font-bold shadow-lg inline-block text-lg animate-pulse">
                    ✏️ 指でなぞって かこんでね！
                  </span>
                ) : viewMode === 'mine' ? (
                  <span className="bg-white/90 border-2 border-terracotta text-terracotta px-4 py-1 rounded-full font-bold shadow-md inline-block text-sm backdrop-blur-sm">
                    👇 地図をおして ピンをさそう！（ドラッグで移動）
                  </span>
                ) : (
                  <span className="bg-green-500/90 text-white px-4 py-1 rounded-full font-bold shadow-md inline-block text-sm backdrop-blur-sm">
                    👀 いまは 見るだけモードです（ドラッグで移動）
                  </span>
                )}
              </div>

              {/* Controls */}
              <div className="absolute bottom-6 right-6 flex flex-col gap-3 z-overlay">
                {!drawMode && isLassoMode && (
                  <button 
                    onClick={() => setDrawMode(true)}
                    className="w-14 h-14 bg-blue-500 hover:bg-blue-600 rounded-full shadow-xl border-4 border-white text-2xl text-white font-bold active:scale-90 transition flex items-center justify-center"
                    title="まとめて見る"
                  >
                    ✏️
                  </button>
                )}
                
                {!drawMode && (
                  <div className="flex flex-col gap-2">
                    <button onClick={() => handleZoom(1)} className="w-12 h-12 bg-white rounded-full shadow-lg border-2 border-gray-200 text-2xl text-gray-600 font-bold active:bg-gray-100 flex items-center justify-center">＋</button>
                    <button onClick={() => handleZoom(-1)} className="w-12 h-12 bg-white rounded-full shadow-lg border-2 border-gray-200 text-2xl text-gray-600 font-bold active:bg-gray-100 flex items-center justify-center">－</button>
                    <button onClick={handleReset} className="w-12 h-12 bg-white rounded-full shadow-lg border-2 border-gray-200 text-xs text-gray-600 font-bold active:bg-gray-100 flex items-center justify-center">戻す</button>
                  </div>
                )}
              </div>
              
              {/* Cancel Draw Button */}
              {drawMode && (
                <div className="absolute bottom-6 right-6 z-overlay">
                  <button 
                    onClick={() => { setDrawMode(false); setLassoPoints([]); }}
                    className="bg-gray-600 text-white px-6 py-3 rounded-full font-bold shadow-lg border-2 border-white"
                  >
                    やめる
                  </button>
                </div>
              )}

              {/* Map Container (Transformed) */}
              <div 
                className="relative select-none origin-center transition-transform duration-75 ease-out"
                style={{ 
                  transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`,
                  width: 'fit-content', height: 'fit-content', maxWidth: '100%', maxHeight: '100%'
                }}
                onClick={handleMapClick} 
              >
                <img 
                  ref={mapRef} 
                  src={resolveImageUrl(mapUrl)} 
                  className="block object-contain pointer-events-none" 
                  alt="Town Map"
                  style={{ maxWidth: '100%', maxHeight: '100%', width: 'auto', height: 'auto', cursor: drawMode ? 'crosshair' : (isLassoMode || transform.scale > 1 ? 'grab' : 'crosshair') }}
                  onDragStart={e => e.preventDefault()}
                />
                
                {/* SVG Drawing Layer */}
                <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{zIndex: 900}} viewBox="0 0 100 100" preserveAspectRatio="none">
                  {lassoPath && (
                    <path d={lassoPath} stroke="#2563EB" strokeWidth="1" fill="rgba(37, 99, 235, 0.2)" vectorEffect="non-scaling-stroke" />
                  )}
                </svg>
                
                {visiblePins.map(pin => (
                  <div key={pin.id} className="absolute pin-element" style={{ left: `${pin.map_x}%`, top: `${pin.map_y}%`, zIndex: 1000 + Math.floor(pin.map_y * 10) }}>
                    <PinIcon color={pin.pin_color} onClick={(e) => handlePinClick(e, pin)} />
                  </div>
                ))}
                
                {creatingPos && (
                  <div style={{ left: `${creatingPos.x}%`, top: `${creatingPos.y}%` }} className="absolute z-[2000]">
                    <PinIcon color="#999" isNew={true} />
                  </div>
                )}
              </div>
            </main>

            {/* Dashboard (背面) */}
            {showDashboard && myGroup === 'teacher' && <TeacherDashboard pins={pins} mapUrl={mapUrl} onUpdateMap={handleUpdateMap} onDeletePin={handleDeletePin} onClose={() => setShowDashboard(false)} openPrompt={openPrompt} />}

            {/* Modals & Overlays (前面) */}
            {areaPins && <PinListModal pins={areaPins} onClose={() => setAreaPins(null)} onSelect={(pin) => { setAreaPins(null); setSelectedPin(pin); }} />}
            {creatingPos && <PinCreateModal position={creatingPos} myGroup={myGroup} onClose={() => setCreatingPos(null)} onSubmit={handleSavePin} isProcessing={processing} />}
            {selectedPin && <PinDetailModal pin={selectedPin} onClose={() => setSelectedPin(null)} onDelete={(id) => openPrompt('削除', '先生用パスワードを入力', (pass) => handleDeletePin(id, pass))} />}
            
            {/* Dialogs & Overlays (最前面) */}
            {modal && <ModalDialog {...modal} />}
            {processing && <LoadingOverlay />}
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
